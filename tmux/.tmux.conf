set -g prefix 'C-\'
set -g prefix2 F5

unbind C-b

# Allow enough time for Meta key sequences to arrive intact over SSH
set -sg escape-time 500

# keep tmux mouse integration disabled (preferred keyboard-only workflow)
set -g status-keys emacs
set -g set-titles on
set -g focus-events on
set -g set-titles-string '#S' # window number,program name,active (or not)
set -g history-limit 10000
bind c new-window -c "$HOME"

set -g status-justify left
set -g status-left-length 50
set -g status-right-length 40

# Window Options
setw -g monitor-activity on
set -g activity-action none

# Resize pane bindings
bind > resize-pane -R 5
bind < resize-pane -L 5
bind + resize-pane -U 5
bind - resize-pane -D 5
bind _ split-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

set -g default-terminal "xterm-256color"
set -as terminal-features ",xterm-256color:RGB,usstyle,cstyle,ccolour"

# This is needed as it sets down the default background color of the status line
set -g status-bg black

set -g window-status-format "#[fg=white,bg=colour0]#I:#{=10:window_name}#F"
set -g window-status-current-format "#[fg=colour255,bg=colour22,bold,underscore]|#I:#{=10:window_name}#F|#[fg=white,bg=colour1]"

# TODO: Instead - invoke a bash defined function that provides context
set -g status-left '#[bg=colour52,fg=white,underscore]#(hostname -s)|'
set -g status-right '#[fg=colour220]|%b-%d %I:%M #(uptime | cut -d "," -f 3- | cut -d ":" -f 2)]'

set-option -g bell-action any
set-option -g visual-bell off

set-window-option -g xterm-keys on
set-window-option -g automatic-rename off
set-option -g allow-rename off
set-window-option -g window-style 'fg=#6e7681,bg=#080a0d'
set-window-option -g window-active-style 'fg=terminal,bg=terminal'
set-window-option -g pane-border-style 'fg=#2a3441'
set-window-option -g pane-active-border-style 'fg=#ffd166,bg=#2b2000'
set-window-option -g pane-border-lines heavy
set-window-option -g pane-border-indicators both
set-window-option -g pane-border-status top
set-window-option -g pane-border-format '#{?pane_active,#[fg=#111111#,bg=#ffd166#,bold#,double-underscore#,us=#111111],#[fg=#9aa3b2#,bg=#1f2430]} #P #{pane_current_command} #[default]'

set -g mouse off
